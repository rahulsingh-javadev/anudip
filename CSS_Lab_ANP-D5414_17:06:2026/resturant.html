<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glenary's Restaurant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Glenary's Restaurant</div>
        <ul>
            <li><a href="#">Menu</a></li>
            <li><a href="#">Popular Dishes</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Menu</h1>

        <div class="menu-items">

            <div class="card">
                <img src="Pizza.png" alt="Pizza Supreme">
                <h2>Pizza Supreme</h2>
                <p>
                    Pizza sauce, mozzarella, bacon, onion, beef mince,
                    capsicum, pepperoni, mushroom, olives
                </p>
                <p class="price">Price: ₹250</p>
            </div>
            <div class="card">
                <img src="pannerTika.png" alt="Paneer Tikka">
                <h2>Paneer Tikka</h2>
                <p>
                    Paneer, Yogurt, Ground Spices, Bell Peppers,
                    Onions, Baby Corn, Mushrooms
                </p>
                <p class="price">Price: ₹200</p>
            </div>

        </div>
    </div>

</body>
</html>
